name: Daily Data Fetch & Deploy

on:
  schedule:
    # UTC 02:00 = 北京时间 10:00，周一到周六执行
    - cron: '0 2 * * 1-6'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 确保获取最新的代码，避免 push 冲突
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python3 scripts/fetch_data.py
        env:
          # 设置 Python 不缓冲输出，方便看日志
          PYTHONUNBUFFERED: "1"

      - name: Check if data was generated
        id: check_data
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [ -f "data/${TODAY}.json" ]; then
            echo "has_new_data=true" >> $GITHUB_OUTPUT
            echo "✅ 数据文件已生成: data/${TODAY}.json"
          else
            # 可能因为时区差异导致日期不同，检查 data 目录是否有新文件
            LATEST=$(ls -t data/*.json 2>/dev/null | head -1)
            if [ -n "$LATEST" ]; then
              echo "has_new_data=true" >> $GITHUB_OUTPUT
              echo "✅ 找到最新数据文件: ${LATEST}"
            else
              echo "has_new_data=false" >> $GITHUB_OUTPUT
              echo "⚠️ 没有找到新的数据文件"
            fi
          fi

      - name: Commit and push data files
        if: steps.check_data.outputs.has_new_data == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 先拉取远程最新代码（在 commit 之前）
          git pull origin main --no-edit || true
          
          # 重新生成 index.json（基于 data/ 目录中所有文件，彻底避免冲突）
          python3 -c "
          import json, glob, os
          data_dir = 'data'
          files = sorted(glob.glob(f'{data_dir}/2026-*.json'), reverse=True)
          summaries = []
          for f in files:
              try:
                  d = json.load(open(f))
                  if not d.get('nasdaq', {}).get('price'):
                      continue
                  summaries.append({
                      'date': d['date'],
                      'overallSentiment': d.get('overallSentiment', 'neutral'),
                      'sentimentScore': d.get('sentimentScore', 0),
                      'nasdaqPrice': d['nasdaq']['price'],
                      'nasdaqChange': d['nasdaq'].get('change', 0),
                      'nasdaqChangePercent': d['nasdaq'].get('changePercent', 0),
                      'sp500Price': d['sp500']['price'],
                      'sp500Change': d['sp500'].get('change', 0),
                      'sp500ChangePercent': d['sp500'].get('changePercent', 0),
                      'vix': d.get('indicators', {}).get('vix'),
                      'newsCount': len(d.get('news', [])),
                  })
              except Exception:
                  continue
          with open(f'{data_dir}/index.json', 'w') as f:
              json.dump(summaries, f, indent=2, ensure_ascii=False)
          print(f'✅ index.json 已重新生成 ({len(summaries)} 条记录)')
          "
          
          # 添加所有数据文件
          git add data/
          
          if git diff --staged --quiet; then
            echo "📌 没有新的数据变化，跳过提交"
          else
            git commit -m "📊 Update market data for $(date -u +%Y-%m-%d)"
            
            # 推送，如果失败则重试
            MAX_RETRIES=3
            for i in $(seq 1 $MAX_RETRIES); do
              echo "🔄 尝试推送 (第 $i 次)..."
              
              if git push origin main; then
                echo "✅ 数据已提交并推送"
                break
              fi
              
              # 推送失败：拉取远程变更后重新生成 index 并提交
              echo "⚠️ 推送失败，拉取远程变更..."
              git pull origin main --no-edit -X theirs
              
              # 重新生成 index（确保无冲突）
              python3 -c "
          import json, glob
          data_dir = 'data'
          files = sorted(glob.glob(f'{data_dir}/2026-*.json'), reverse=True)
          summaries = []
          for f in files:
              try:
                  d = json.load(open(f))
                  if not d.get('nasdaq', {}).get('price'):
                      continue
                  summaries.append({
                      'date': d['date'],
                      'overallSentiment': d.get('overallSentiment', 'neutral'),
                      'sentimentScore': d.get('sentimentScore', 0),
                      'nasdaqPrice': d['nasdaq']['price'],
                      'nasdaqChange': d['nasdaq'].get('change', 0),
                      'nasdaqChangePercent': d['nasdaq'].get('changePercent', 0),
                      'sp500Price': d['sp500']['price'],
                      'sp500Change': d['sp500'].get('change', 0),
                      'sp500ChangePercent': d['sp500'].get('changePercent', 0),
                      'vix': d.get('indicators', {}).get('vix'),
                      'newsCount': len(d.get('news', [])),
                  })
              except Exception:
                  continue
          with open(f'{data_dir}/index.json', 'w') as f:
              json.dump(summaries, f, indent=2, ensure_ascii=False)
          "
              
              git add data/
              git diff --staged --quiet || git commit -m "📊 Update market data for $(date -u +%Y-%m-%d)"
              
              sleep 2
              
              if [ $i -eq $MAX_RETRIES ]; then
                echo "❌ 推送失败，已达最大重试次数"
                exit 1
              fi
            done
          fi

      - name: Send WeCom notification
        if: always()
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          if [ -z "$WECOM_WEBHOOK_URL" ]; then
            echo "⚠️ WECOM_WEBHOOK_URL 未设置，跳过通知"
            exit 0
          fi
          
          LATEST_FILE=$(ls -t data/*.json 2>/dev/null | grep -v index.json | head -1)
          if [ -n "$LATEST_FILE" ] && [ "${{ job.status }}" = "success" ]; then
            NASDAQ=$(python3 -c "import json; d=json.load(open('$LATEST_FILE')); print(f\"{d['nasdaq']['price']:,.2f} ({d['nasdaq']['changePercent']:+.2f}%)\")" 2>/dev/null || echo "N/A")
            SP500=$(python3 -c "import json; d=json.load(open('$LATEST_FILE')); print(f\"{d['sp500']['price']:,.2f} ({d['sp500']['changePercent']:+.2f}%)\")" 2>/dev/null || echo "N/A")
            SENTIMENT=$(python3 -c "import json; d=json.load(open('$LATEST_FILE')); s=d['overallSentiment']; print('🔴 看涨' if s=='bullish' else '🟢 看跌' if s=='bearish' else '🟡 中性')" 2>/dev/null || echo "N/A")
            SCORE=$(python3 -c "import json; d=json.load(open('$LATEST_FILE')); print(d['sentimentScore'])" 2>/dev/null || echo "N/A")
            FORECAST=$(python3 -c "import json; d=json.load(open('$LATEST_FILE')); print(d.get('forecastDate', d['date']))" 2>/dev/null || echo "N/A")
            DATA_DATE=$(python3 -c "import json; d=json.load(open('$LATEST_FILE')); print(d.get('dataDate', ''))" 2>/dev/null || echo "")
            VIX=$(python3 -c "import json; d=json.load(open('$LATEST_FILE')); print(d['indicators'].get('vix', 'N/A'))" 2>/dev/null || echo "N/A")
            
            CONTENT="📊 **${FORECAST} 晴雨表已更新**\n"
            CONTENT+=">基于 **${DATA_DATE}** 收盘数据\n"
            CONTENT+=">情绪：**${SENTIMENT}** (${SCORE})\n"
            CONTENT+=">纳指：${NASDAQ}\n"
            CONTENT+=">标普：${SP500}\n"
            CONTENT+=">VIX：${VIX}\n"
            CONTENT+=">[👉 查看详情](https://investing.lz5z.com/barometer/${FORECAST}/)"
          else
            CONTENT="❌ **投资晴雨表更新失败**\n"
            CONTENT+=">GitHub Actions 状态: ${{ job.status }}\n"
            CONTENT+=">[查看日志](https://github.com/Leo555/investing/actions)"
          fi
          
          curl -s -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"${CONTENT}\"}}" \
            "${WECOM_WEBHOOK_URL}" > /dev/null 2>&1
          echo "✅ 企业微信通知已发送"

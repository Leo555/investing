name: Daily Data Fetch & Deploy

on:
  schedule:
    # 每天 UTC 02:00 执行 = 北京时间每天上午 10:00
    # 包含周末
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 确保获取最新的代码，避免 push 冲突
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python3 scripts/fetch_data.py
        env:
          # 设置 Python 不缓冲输出，方便看日志
          PYTHONUNBUFFERED: "1"

      - name: Check if data was generated
        id: check_data
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [ -f "data/${TODAY}.json" ]; then
            echo "has_new_data=true" >> $GITHUB_OUTPUT
            echo "✅ 数据文件已生成: data/${TODAY}.json"
          else
            # 可能因为时区差异导致日期不同，检查 data 目录是否有新文件
            LATEST=$(ls -t data/*.json 2>/dev/null | head -1)
            if [ -n "$LATEST" ]; then
              echo "has_new_data=true" >> $GITHUB_OUTPUT
              echo "✅ 找到最新数据文件: ${LATEST}"
            else
              echo "has_new_data=false" >> $GITHUB_OUTPUT
              echo "⚠️ 没有找到新的数据文件"
            fi
          fi

      - name: Commit and push data files
        if: steps.check_data.outputs.has_new_data == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "📌 没有新的数据变化，跳过提交"
          else
            git commit -m "📊 Update market data for $(date -u +%Y-%m-%d)"
            
            # 拉取远程变更，处理可能的冲突
            MAX_RETRIES=3
            for i in $(seq 1 $MAX_RETRIES); do
              echo "🔄 尝试推送 (第 $i 次)..."
              
              # 先尝试 pull --rebase
              if git pull --rebase origin main; then
                echo "✅ Rebase 成功"
              else
                echo "⚠️ Rebase 遇到冲突，自动解决..."
                # 对 data/ 目录的冲突文件使用本地版本（Actions 生成的最新数据）
                git diff --name-only --diff-filter=U | while read file; do
                  echo "  解决冲突: $file (使用本地版本)"
                  git checkout --theirs "$file"
                  git add "$file"
                done
                GIT_EDITOR=true git rebase --continue || git rebase --skip || true
              fi
              
              # 尝试推送
              if git push origin main; then
                echo "✅ 数据已提交并推送"
                break
              else
                echo "⚠️ 推送失败，重试..."
                sleep 2
              fi
              
              if [ $i -eq $MAX_RETRIES ]; then
                echo "❌ 推送失败，已达最大重试次数"
                exit 1
              fi
            done
          fi
